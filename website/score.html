<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XPOSE Scorecard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .scorecard-hero { padding: 120px 0 60px; text-align: center; }
    .card-container { max-width: 600px; margin: 0 auto; background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px; margin-bottom: 100px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .card-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--glass-border); padding-bottom: 24px; margin-bottom: 24px; }
    .card-site { display: flex; align-items: center; gap: 16px; }
    .card-icon { font-size: 32px; width: 56px; height: 56px; background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .card-name { font-size: 24px; font-weight: 800; }
    .card-url { font-size: 14px; color: var(--text-muted); }
    .share-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .share-btn:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <nav class="nav" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" fill="#E24B4A"/><path d="M9 12l2 2 4-4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span><span class="logo-x">X</span><span class="logo-pose">POSE</span></span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Leaderboard</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="scorecard-hero">
      <div class="section-tag" style="color:var(--text-muted)">PUBLIC SCORECARD</div>
      <h1 class="section-title">Dark Pattern Report</h1>
    </div>

    <div class="card-container" id="scorecardContent" style="display:none">
      <div class="card-header">
        <div class="card-site">
          <div class="card-icon" id="scIcon"></div>
          <div>
            <div class="card-name" id="scName"></div>
            <div class="card-url" id="scUrl"></div>
          </div>
        </div>
        <button class="share-btn" onclick="copyLink()">Copy Link</button>
      </div>

      <div class="modal-score-row" style="background:transparent; border:none; padding:0">
        <div class="modal-score-circle">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="33" fill="none" stroke="#f0f0f0" stroke-width="8"/>
            <circle cx="40" cy="40" r="33" fill="none" id="scScoreRing" stroke="#E24B4A" stroke-width="8"
              stroke-dasharray="207.3" stroke-dashoffset="207.3" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1s ease"/>
          </svg>
          <div class="modal-score-inner">
            <div class="modal-score-val" id="scScoreVal"></div>
            <div class="modal-score-sub">/100</div>
          </div>
        </div>
        <div class="modal-metrics">
          <div class="modal-metric"><span class="mm-val red" id="scPatterns"></span><span class="mm-label">Dark Patterns</span></div>
          <div class="modal-metric"><span class="mm-val amber" id="scFees"></span><span class="mm-label">Hidden Fees</span></div>
          <div class="modal-metric"><span class="mm-val" id="scComplaints"></span><span class="mm-label">Complaints</span></div>
        </div>
      </div>

      <div class="modal-violations" id="scViolations" style="margin-top:32px"></div>
    </div>
    
    <div id="errorState" style="display:none; text-align:center; margin-bottom:100px;">
      <h2>Scorecard not found</h2>
      <a href="index.html" style="color:var(--accent); text-decoration:underline;">Return to Leaderboard</a>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const idx = params.get('idx');
      
      if (idx !== null && LEADERBOARD_DATA[idx]) {
        const d = LEADERBOARD_DATA[idx];
        document.getElementById('scorecardContent').style.display = 'block';
        document.getElementById('scIcon').textContent = d.emoji;
        document.getElementById('scName').textContent = d.name;
        document.getElementById('scUrl').textContent = d.url;
        document.getElementById('scScoreVal').textContent = d.score;
        document.getElementById('scPatterns').textContent = d.patterns;
        document.getElementById('scFees').textContent = d.hiddenFees;
        document.getElementById('scComplaints').textContent = d.complaints;

        const ring = document.getElementById('scScoreRing');
        const circ = 207.3;
        const offset = circ - (circ * d.score / 100);
        const color = d.verdictClass === 'safe' ? '#10B981' : d.verdictClass === 'attention' ? '#F59E0B' : '#E24B4A';
        ring.style.strokeDashoffset = circ;
        ring.style.stroke = color;
        setTimeout(() => { ring.style.strokeDashoffset = offset; }, 100);

        document.getElementById('scViolations').innerHTML = `
          <div class="mv-label">Violations &amp; Dark Patterns</div>
          ${d.violations.map(v => `
            <div class="mv-item ${v.type.toLowerCase()}">
              <div class="mv-type">${v.type}</div>
              <div class="mv-body">
                <div class="mv-title">${v.title}</div>
                <div class="mv-desc">${v.desc}</div>
                <div class="mv-reg">📋 ${v.reg}</div>
              </div>
            </div>
          `).join('')}
        `;
      } else {
        document.getElementById('errorState').style.display = 'block';
      }
    });

    function copyLink() {
      navigator.clipboard.writeText(window.location.href);
      alert("Link copied to clipboard!");
    }
  </script>
</body>
</html>
